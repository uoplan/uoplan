name: Daily catalogue and schedule scrape

on:
  schedule:
    # 05:00 UTC ≈ midnight America/Toronto (standard) / 1am (DST)
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  catalogue_and_terms:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    outputs:
      terms: ${{ steps.set_terms.outputs.terms }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear scraper caches (no cache mode)
        run: rm -rf .cache

      - name: Run catalogue scraper
        run: pnpm run scrape:catalogue

      - name: Scrape term list for schedule matrix
        run: pnpm run scrape:schedules:terms

      - name: Set terms matrix output
        id: set_terms
        run: |
          {
            echo 'terms<<EOF'
            jq -c '[.terms[].termId]' apps/web/public/data/terms.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload catalogue and shared data for schedule jobs
        uses: actions/upload-artifact@v4
        with:
          name: catalogue-data
          path: apps/web/public/data
          if-no-files-found: error

  schedule_term:
    needs: catalogue_and_terms
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: true
      matrix:
        term: ${{ fromJSON(needs.catalogue_and_terms.outputs.terms) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download catalogue and shared data
        uses: actions/download-artifact@v4
        with:
          name: catalogue-data
          path: apps/web/public/data

      - name: Clear scraper caches (no cache mode)
        run: rm -rf .cache

      - name: Run schedule scraper for one term
        env:
          ONLY_TERM_ID: ${{ matrix.term }}
        run: pnpm run scrape:schedules

      - name: Upload schedules for this term
        uses: actions/upload-artifact@v4
        with:
          name: schedule-${{ matrix.term }}
          path: apps/web/public/data/schedules.${{ matrix.term }}.json
          if-no-files-found: error

  ratemyprofessors:
    needs: catalogue_and_terms
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clear scraper caches (no cache mode)
        run: rm -rf .cache

      - name: Run RateMyProfessors scraper
        run: pnpm run scrape:ratemyprofessors

      - name: Upload RateMyProfessors data
        uses: actions/upload-artifact@v4
        with:
          name: ratemyprofessors-data
          path: apps/web/public/data/ratemyprofessors.json
          if-no-files-found: error

  merge_and_push:
    needs:
      - catalogue_and_terms
      - schedule_term
      - ratemyprofessors
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backup existing JSON data
        run: |
          # Determine current academic year (Sep = new year)
          MONTH=$(date +%-m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -ge 9 ]; then
            CURRENT_YEAR=$YEAR
          else
            CURRENT_YEAR=$((YEAR - 1))
          fi
          echo "CURRENT_YEAR=$CURRENT_YEAR" >> "$GITHUB_ENV"

          # Manifest and missing log
          cp apps/web/public/data/catalogue.json /tmp/catalogue_manifest_old.json || true
          cp apps/web/public/data/catalogue.missing.json /tmp/catalogue_missing_old.json || true

          # Only the current year is re-scraped every run
          cp "apps/web/public/data/catalogue.${CURRENT_YEAR}.json" "/tmp/catalogue_current_old.json" || true

          cp apps/web/public/data/terms.json /tmp/terms_old.json || true
          cp apps/web/public/data/ratemyprofessors.json /tmp/ratemyprofessors_old.json || true
          mkdir -p /tmp/schedules_old
          shopt -s nullglob
          for f in apps/web/public/data/schedules.*.json; do
            cp "$f" "/tmp/schedules_old/$(basename "$f")"
          done
          shopt -u nullglob

      - name: Download catalogue and shared data from setup job
        uses: actions/download-artifact@v4
        with:
          name: catalogue-data
          path: apps/web/public/data

      - name: Download per-term schedule JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: schedule-*
          path: apps/web/public/data
          merge-multiple: true

      - name: Download RateMyProfessors data
        uses: actions/download-artifact@v4
        with:
          name: ratemyprofessors-data
          path: apps/web/public/data

      - name: Show JSON diffs (catalogue and schedules)
        run: |
          echo "::group::Diff catalogue.json (manifest)"
          diff -u /tmp/catalogue_manifest_old.json apps/web/public/data/catalogue.json || true
          echo "::endgroup::"

          echo "::group::Diff catalogue.${CURRENT_YEAR}.json (current year)"
          diff -u /tmp/catalogue_current_old.json "apps/web/public/data/catalogue.${CURRENT_YEAR}.json" || true
          echo "::endgroup::"

          echo "::group::New archive catalogue files"
          shopt -s nullglob
          for f in apps/web/public/data/catalogue.*.json; do
            base=$(basename "$f")
            # Skip manifest and current year (already diffed above)
            [ "$base" = "catalogue.json" ] && continue
            [ "$base" = "catalogue.${CURRENT_YEAR}.json" ] && continue
            if ! git show "HEAD:apps/web/public/data/$base" &>/dev/null; then
              echo "New file: $f"
            fi
          done
          shopt -u nullglob
          echo "::endgroup::"

          echo "::group::Diff catalogue.missing.json"
          diff -u /tmp/catalogue_missing_old.json apps/web/public/data/catalogue.missing.json || true
          echo "::endgroup::"

          echo "::group::Diff terms.json"
          diff -u /tmp/terms_old.json apps/web/public/data/terms.json || true
          echo "::endgroup::"

          echo "::group::Diff ratemyprofessors.json"
          diff -u /tmp/ratemyprofessors_old.json apps/web/public/data/ratemyprofessors.json || true
          echo "::endgroup::"

          echo "::group::Diff schedules.*.json"
          shopt -s nullglob
          for f in apps/web/public/data/schedules.*.json; do
            old="/tmp/schedules_old/$(basename "$f")"
            if [ -f "$old" ]; then
              diff -u "$old" "$f" || true
            else
              echo "New file: $f"
            fi
          done
          shopt -u nullglob
          echo "::endgroup::"

      - name: Check for data changes
        id: check_changes
        run: |
          # git status --porcelain detects both modified tracked files and new untracked files
          CHANGED=$(git status --porcelain -- \
            'apps/web/public/data/catalogue.json' \
            'apps/web/public/data/catalogue.missing.json' \
            apps/web/public/data/catalogue.*.json \
            'apps/web/public/data/indices.json' \
            apps/web/public/data/terms.json \
            apps/web/public/data/ratemyprofessors.json \
            apps/web/public/data/schedules.*.json \
          | wc -l)
          if [ "$CHANGED" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # main may advance while scrapers run — rebase our working changes onto latest main
          git stash push -u -m "daily-scrape pre-sync" -- apps/web/public/data/
          if ! git pull --rebase origin main; then
            git stash pop
            exit 1
          fi
          git stash pop

          git add apps/web/public/data/catalogue.json apps/web/public/data/catalogue.missing.json apps/web/public/data/catalogue.*.json apps/web/public/data/indices.json apps/web/public/data/terms.json apps/web/public/data/ratemyprofessors.json apps/web/public/data/schedules.*.json

          BOT_EMAIL="github-actions[bot]@users.noreply.github.com"
          LAST_AUTHOR_EMAIL=$(git log -1 --format='%ae')

          if [ "$LAST_AUTHOR_EMAIL" = "$BOT_EMAIL" ]; then
            # Previous commit was from the bot — amend it in place
            git commit --amend --no-edit
          else
            # Previous commit was from a human — amend but keep their authorship
            # and credit the bot as a co-author
            BOT_COAUTHOR="Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            LAST_MSG=$(git log -1 --format='%B')
            if echo "$LAST_MSG" | grep -qF "$BOT_COAUTHOR"; then
              git commit --amend --no-edit
            else
              git commit --amend -m "${LAST_MSG}"$'\n\n'"${BOT_COAUTHOR}"
            fi
          fi

          git push --force-with-lease origin HEAD:main
