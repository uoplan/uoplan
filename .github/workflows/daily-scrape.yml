name: Daily catalogue and schedule scrape

on:
  schedule:
    # 05:00 UTC ≈ midnight America/Toronto (standard) / 1am (DST)
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Backup existing JSON data
        run: |
          # Determine current academic year (Sep = new year)
          MONTH=$(date +%-m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -ge 9 ]; then
            CURRENT_YEAR=$YEAR
          else
            CURRENT_YEAR=$((YEAR - 1))
          fi
          echo "CURRENT_YEAR=$CURRENT_YEAR" >> "$GITHUB_ENV"

          # Manifest and missing log
          cp public/data/catalogue.json /tmp/catalogue_manifest_old.json || true
          cp public/data/catalogue.missing.json /tmp/catalogue_missing_old.json || true

          # Only the current year is re-scraped every run
          cp "public/data/catalogue.${CURRENT_YEAR}.json" "/tmp/catalogue_current_old.json" || true

          cp public/data/terms.json /tmp/terms_old.json || true
          cp public/data/ratemyprofessors.json /tmp/ratemyprofessors_old.json || true
          mkdir -p /tmp/schedules_old
          shopt -s nullglob
          for f in public/data/schedules.*.json; do
            cp "$f" "/tmp/schedules_old/$(basename "$f")"
          done
          shopt -u nullglob

      - name: Clear scraper caches (no cache mode)
        run: rm -rf .cache

      - name: Run catalogue scraper
        run: pnpm run scrape:catalogue

      - name: Run schedule scraper
        run: pnpm run scrape:schedules

      - name: Run RateMyProfessors scraper
        run: pnpm run scrape:ratemyprofessors

      - name: Show JSON diffs (catalogue and schedules)
        run: |
          echo "::group::Diff catalogue.json (manifest)"
          diff -u /tmp/catalogue_manifest_old.json public/data/catalogue.json || true
          echo "::endgroup::"

          echo "::group::Diff catalogue.${CURRENT_YEAR}.json (current year)"
          diff -u /tmp/catalogue_current_old.json "public/data/catalogue.${CURRENT_YEAR}.json" || true
          echo "::endgroup::"

          echo "::group::New archive catalogue files"
          shopt -s nullglob
          for f in public/data/catalogue.*.json; do
            base=$(basename "$f")
            # Skip manifest and current year (already diffed above)
            [ "$base" = "catalogue.json" ] && continue
            [ "$base" = "catalogue.${CURRENT_YEAR}.json" ] && continue
            if ! git show "HEAD:public/data/$base" &>/dev/null; then
              echo "New file: $f"
            fi
          done
          shopt -u nullglob
          echo "::endgroup::"

          echo "::group::Diff catalogue.missing.json"
          diff -u /tmp/catalogue_missing_old.json public/data/catalogue.missing.json || true
          echo "::endgroup::"

          echo "::group::Diff terms.json"
          diff -u /tmp/terms_old.json public/data/terms.json || true
          echo "::endgroup::"

          echo "::group::Diff ratemyprofessors.json"
          diff -u /tmp/ratemyprofessors_old.json public/data/ratemyprofessors.json || true
          echo "::endgroup::"

          echo "::group::Diff schedules.*.json"
          shopt -s nullglob
          for f in public/data/schedules.*.json; do
            old="/tmp/schedules_old/$(basename "$f")"
            if [ -f "$old" ]; then
              diff -u "$old" "$f" || true
            else
              echo "New file: $f"
            fi
          done
          shopt -u nullglob
          echo "::endgroup::"

      - name: Check for data changes
        id: check_changes
        run: |
          # git status --porcelain detects both modified tracked files and new untracked files
          CHANGED=$(git status --porcelain -- \
            'public/data/catalogue.json' \
            'public/data/catalogue.missing.json' \
            public/data/catalogue.*.json \
            public/data/terms.json \
            public/data/ratemyprofessors.json \
            public/data/schedules.*.json \
          | wc -l)
          if [ "$CHANGED" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/catalogue.json public/data/catalogue.missing.json public/data/catalogue.*.json public/data/terms.json public/data/ratemyprofessors.json public/data/schedules.*.json

          BOT_EMAIL="github-actions[bot]@users.noreply.github.com"
          LAST_AUTHOR_EMAIL=$(git log -1 --format='%ae')

          if [ "$LAST_AUTHOR_EMAIL" = "$BOT_EMAIL" ]; then
            # Previous commit was from the bot — amend it in place
            git commit --amend --no-edit
          else
            # Previous commit was from a human — amend but keep their authorship
            # and credit the bot as a co-author
            BOT_COAUTHOR="Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            LAST_MSG=$(git log -1 --format='%B')
            if echo "$LAST_MSG" | grep -qF "$BOT_COAUTHOR"; then
              git commit --amend --no-edit
            else
              git commit --amend -m "${LAST_MSG}"$'\n\n'"${BOT_COAUTHOR}"
            fi
          fi

          git push --force-with-lease origin HEAD:main
